    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Restore Tailwind CDN for styling to work without a build step -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Inter"', '"Plus Jakarta Sans"', '"Noto Sans Bengali"', 'sans-serif'],
            },
            colors: {
              primary: { 
                DEFAULT: '#6366F1', /* Indigo 500 */
                50: '#EEF2FF', 
                600: '#4F46E5', 
                700: '#4338CA' 
              },
              surface: '#FFFFFF',
              background: '#FAFAFA',
              border: '#E2E8F0',
              text: {
                primary: '#111827',
                secondary: '#6B7280',
                muted: '#9CA3AF'
              }
            },
            borderRadius: {
              'xl': '20px',
              '2xl': '24px',
            },
            boxShadow: {
              'soft': '0 1px 3px rgba(0,0,0,0.05)',
              'lifted': '0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025)',
            },
            zIndex: {
              'header': '40', /* TopBar, App Shell */
              'status': '50', /* Offline, Update Indicators */
              'toast': '60',  /* Toast Notifications */
              'prompt': '70', /* Install Prompts */
              'modal': '80',  /* Dialogs */
              'overlay': '90',/* Loading Overlays */
            },
            animation: {
              'fade-in': 'fadeIn 0.3s ease-out forwards',
              'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'zoom-in-95': 'zoomIn95 0.2s ease-out forwards',
              'slide-in-from-top-1': 'slideInFromTop1 0.3s ease-out forwards',
              'slide-in-from-bottom-2': 'slideInFromBottom2 0.3s ease-out forwards',
              'slide-in-from-right-4': 'slideInFromRight4 0.3s ease-out forwards',
            },
            keyframes: {
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              slideUp: { '0%': { transform: 'translateY(10px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
              zoomIn95: { '0%': { transform: 'scale(0.95)', opacity: '0' }, '100%': { transform: 'scale(1)', opacity: '1' } },
              slideInFromTop1: { '0%': { transform: 'translateY(-0.25rem)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
              slideInFromBottom2: { '0%': { transform: 'translateY(0.5rem)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
              slideInFromRight4: { '0%': { transform: 'translateX(1rem)', opacity: '0' }, '100%': { transform: 'translateX(0)', opacity: '1' } },
            }
          }
        }
      }
    </script>

    <script type="importmap">
    {
      "imports": {
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
        "@google/genai": "https://esm.sh/@google/genai@^1.39.0",

        "firebase/": "https://esm.sh/firebase@^12.8.0/"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
    <style>
      /* Native-like CSS-only Splash Screen */
      #native-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #F8FAFC;
        transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
        overflow: hidden;
        font-family: 'Inter', sans-serif;
      }
      #native-splash.splash-exit {
        opacity: 0;
        transform: scale(1.05);
        pointer-events: none;
      }

      /* Subtle background orbs */
      .splash-bg-1 {
        position: absolute;
        width: 500px;
        height: 500px;
        background-color: rgba(224, 231, 255, 0.5); /* indigo-100/50 */
        border-radius: 50%;
        filter: blur(100px);
        animation: pulseBg 4s infinite ease-in-out;
      }
      .splash-bg-2 {
        position: absolute;
        top: -80px;
        right: -80px;
        width: 256px;
        height: 256px;
        background-color: rgba(243, 232, 255, 0.5); /* purple-100/50 */
        border-radius: 50%;
        filter: blur(80px);
        animation: pulseBg2 5s infinite ease-in-out 1s;
      }

      /* Icon Container */
      .splash-icon-container {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: springUp 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      .splash-icon-box {
        position: relative;
        background-color: white;
        padding: 24px;
        border-radius: 28px;
        box-shadow: 0 20px 40px -15px rgba(99, 102, 241, 0.2);
        border: 1px solid #F1F5F9;
      }
      
      .splash-icon-inner {
        background: linear-gradient(135deg, #6366F1, #9333EA);
        padding: 16px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .splash-sparkles {
        position: absolute;
        top: -12px;
        right: -12px;
        color: #FBBF24;
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        animation: twinkle 2.5s infinite ease-in-out;
      }

      /* Text */
      .splash-text-container {
        margin-top: 32px;
        text-align: center;
        animation: fadeUp 0.5s ease-out 0.3s forwards;
        opacity: 0;
        transform: translateY(15px);
      }
      .splash-title {
        font-size: 36px;
        font-weight: 800;
        color: #0F172A;
        letter-spacing: -0.02em;
        margin: 0;
      }
      .splash-tagline {
        margin-top: 8px;
        color: #4F46E5;
        font-weight: 700;
        font-size: 12px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        animation: fadeIn 0.8s ease-out 0.6s forwards;
        opacity: 0;
      }

      /* Loader */
      .splash-loader {
        position: absolute;
        bottom: 64px;
        display: flex;
        gap: 8px;
        animation: fadeIn 0.5s ease-out 0.8s forwards;
        opacity: 0;
      }
      .splash-dot {
        width: 8px;
        height: 8px;
        background-color: #A5B4FC;
        border-radius: 50%;
        animation: bounceDot 0.8s infinite ease-in-out;
      }
      .splash-dot:nth-child(1) { animation-delay: 0s; }
      .splash-dot:nth-child(2) { animation-delay: 0.15s; }
      .splash-dot:nth-child(3) { animation-delay: 0.3s; }

      /* Keyframes */
      @keyframes pulseBg {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.1); opacity: 0.8; }
      }
      @keyframes pulseBg2 {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.2); }
      }
      @keyframes springUp {
        0% { transform: translateY(30px) scale(0.9); opacity: 0; }
        100% { transform: translateY(0) scale(1); opacity: 1; }
      }
      @keyframes twinkle {
        0%, 100% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(15deg) scale(1.1); }
      }
      @keyframes fadeUp {
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes fadeIn {
        to { opacity: 1; }
      }
      @keyframes bounceDot {
        0%, 100% { transform: translateY(0); background-color: #a5b4fc; }
        50% { transform: translateY(-8px); background-color: #6366f1; }
      }
    </style>
</head>
  <body>
    <!-- Native-like HTML/CSS Splash Screen (Loads Instantly) -->
    <div id="native-splash">
      <div class="splash-bg-1"></div>
      <div class="splash-bg-2"></div>
      
      <div class="splash-icon-container">
        <div class="splash-icon-box">
          <div class="splash-icon-inner">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.42 10.922a2 2 0 0 1-.01 2.859l-7.18 7.18a2 2 0 0 1-2.83 0L2.5 12.06c-.82-.82-.82-2.14 0-2.96l7.18-7.18a2 2 0 0 1 2.83 0l8.91 8.914Z"/>
              <path d="m22 2-2 2"/>
              <path d="m2 2 2 2"/>
              <path d="m22 22-2-2"/>
              <path d="m2 22 2-2"/>
            </svg>
          </div>
          <svg class="splash-sparkles" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="none">
            <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
          </svg>
        </div>

        <div class="splash-text-container">
          <h1 class="splash-title">Mcq Guru</h1>
          <p class="splash-tagline">Master Your Knowledge</p>
        </div>
      </div>

      <div class="splash-loader">
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
